<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>first-hello 打招呼语生成器</title>
  <style>
    :root {
      --bg: #F3F5F9;
      --surface: #FFFFFF;
      --ink: #1B2430;
      --muted: #6B7684;
      --line: #E3E8F0;
      --accent: #2B5CE6;
      --accent-press: #1E45B8;
      --bubble: #EAF0FF;
    }

    * { box-sizing: border-box; }

    body {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 16px 80px;
      font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header { margin-bottom: 28px; }
    h1 { margin: 0 0 6px; font-size: 26px; letter-spacing: 0.5px; }
    h1 .dot { color: var(--accent); }
    .tagline { margin: 0; color: var(--muted); font-size: 14px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }
    label { font-size: 14px; font-weight: 600; }
    .hint { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }

    textarea {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--ink);
      background: #FAFBFD;
      border: 1px solid var(--line);
      border-radius: 10px;
      resize: vertical;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(43, 92, 230, .12);
    }

    button {
      font-size: 14px;
      padding: 10px 22px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      transition: transform .08s ease, box-shadow .15s ease, background .15s;
    }
    button:hover { box-shadow: 0 2px 8px rgba(27, 36, 48, .08); }
    button:active { transform: translateY(1px) scale(.98); box-shadow: none; }
    button:focus-visible { outline: 3px solid rgba(43, 92, 230, .35); outline-offset: 2px; }
    button:disabled { cursor: not-allowed; opacity: .45; transform: none; box-shadow: none; }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
      padding: 12px 34px;
      box-shadow: 0 3px 10px rgba(43, 92, 230, .28);
    }
    .btn-primary:hover { background: #3568F0; box-shadow: 0 5px 14px rgba(43, 92, 230, .34); }
    .btn-primary:active { background: var(--accent-press); }

    .btn-copy {
      font-size: 13px;
      padding: 7px 16px;
    }

    .pdf-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .pdf-row input[type=file] { font-size: 13px; color: var(--muted); }
    .pdf-row input[type=file]::file-selector-button {
      font-size: 13px;
      padding: 8px 16px;
      margin-right: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      transition: transform .08s ease, box-shadow .15s ease;
    }
    .pdf-row input[type=file]::file-selector-button:hover { box-shadow: 0 2px 8px rgba(27, 36, 48, .08); }
    .pdf-row input[type=file]::file-selector-button:active { transform: translateY(1px) scale(.98); box-shadow: none; }
    #pdfStatus { color: var(--muted); font-size: 13px; }

    .actions { display: flex; gap: 12px; margin: 6px 0 22px; }

    /* ---- 结果:两个独立气泡卡片 ---- */
    .result-block { margin-bottom: 20px; }
    .result-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .result-title { font-size: 13px; color: var(--muted); }

    .bubble {
      position: relative;
      white-space: pre-wrap;
      background: var(--bubble);
      border: 1px solid #D8E2FA;
      padding: 18px 20px;
      border-radius: 16px;
      border-top-left-radius: 4px;
      line-height: 1.8;
      font-size: 14.5px;
      min-height: 56px;
      animation: rise .3s ease;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .typing { display: inline-flex; gap: 5px; align-items: center; height: 20px; }
    .typing i {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s infinite ease-in-out;
    }
    .typing i:nth-child(2) { animation-delay: .2s; }
    .typing i:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 60%, 100% { opacity: .25; transform: translateY(0); }
      30%           { opacity: 1;   transform: translateY(-3px); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }

    /* ---- 历史记录 ---- */
    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .hist-empty { color: var(--muted); font-size: 13px; padding: 8px 2px; }
    .hist-item { border-top: 1px solid var(--line); }
    .hist-item:first-child { border-top: none; }
    .hist-item-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px 2px;
      cursor: pointer;
    }
    .hist-item-head:hover .hist-jd { color: var(--accent); }
    .hist-jd {
      font-size: 14px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .hist-time { color: var(--muted); font-size: 12px; flex-shrink: 0; }
    .hist-body { padding: 2px 2px 16px; animation: rise .25s ease; }
    .hist-block { margin-bottom: 12px; }
    .hist-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .hist-text { white-space: pre-wrap; font-size: 14px; line-height: 1.75; }
    .hist-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .hist-actions button { font-size: 12px; padding: 6px 14px; }
    .btn-danger { color: #C0392B; border-color: #E7B7B0; }
    .btn-danger:hover { background: #FDECEA; box-shadow: none; }
  </style>
</head>
<body>
  <header>
    <h1>first-hello<span class="dot">.</span></h1>
    <p class="tagline">贴入岗位JD,基于你的真实经历,生成第一句打招呼语 —— 只挑不编。</p>
  </header>

  <div class="card">
    <label>我的素材 <span class="hint">简历要点,或直接从PDF导入</span></label>
    <div class="pdf-row">
      <input type="file" id="pdfFile" accept=".pdf">
      <button onclick="uploadPdf()">从简历PDF导入</button>
      <span id="pdfStatus"></span>
    </div>
    <textarea id="me" rows="8" placeholder="粘贴你的求职素材……"></textarea>
  </div>

  <div class="card">
    <label>岗位JD <span class="hint">职位描述 + 任职要求</span></label>
    <textarea id="jd" rows="8" placeholder="粘贴岗位描述……"></textarea>
  </div>

  <div class="actions">
    <button id="genBtn" class="btn-primary" onclick="generate()">生成开场白</button>
  </div>

  <!-- 打招呼语卡片 -->
  <div class="result-block">
    <div class="result-head">
      <span class="result-title">打招呼语 · 用于BOSS首次沟通</span>
      <button class="btn-copy" id="copyHello" onclick="copyBox('helloBox', this)">复制</button>
    </div>
    <div class="bubble" id="helloBox">生成后出现在这里</div>
  </div>

  <!-- 自我介绍卡片 -->
  <div class="result-block">
    <div class="result-head">
      <span class="result-title">自我介绍 · 用于官网网申/沟通展开</span>
      <button class="btn-copy" id="copyIntro" onclick="copyBox('introBox', this)">复制</button>
    </div>
    <div class="bubble" id="introBox">生成后出现在这里</div>
  </div>

  <!-- 历史记录 -->
  <div class="card">
    <div class="history-head">
      <label>历史记录 <span class="hint">自动保存在本浏览器,仅你可见</span></label>
      <button class="btn-copy btn-danger" onclick="clearHistory()">清空</button>
    </div>
    <div id="historyList"></div>
  </div>

  <script>
    const TYPING = '<span class="typing"><i></i><i></i><i></i></span>';
    const ERROR_MARK = "⚠️ 生成中断";   // 与后端 stream() 出错时补发的前缀保持一致

    // ---- 生成:边流边分,两个框接力打字 ----
    async function generate() {
      const me = document.getElementById("me").value.trim();
      const jd = document.getElementById("jd").value.trim();
      const helloBox = document.getElementById("helloBox");
      const introBox = document.getElementById("introBox");
      const btn = document.getElementById("genBtn");

      // 发之前先判空,空请求根本不打到后端
      if (!me || !jd) {
        helloBox.innerText = !me && !jd ? "素材和 JD 都还没填。"
                           : !me ? "素材还没填。" : "岗位 JD 还没填。";
        introBox.innerText = "生成后出现在这里";
        return;
      }

      btn.disabled = true;
      helloBox.innerHTML = TYPING;
      introBox.innerHTML = TYPING;

      let full = "";        // 完整累积文本
      let started = false;  // 首字到了没
      try {
        const resp = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ me: me, jd: jd })
        });
        // 非 200:后端返回的是 {error:...},读出来好好显示,而不是当正文渲染
        if (!resp.ok) {
          let msg = "生成失败(" + resp.status + ")";
          try { const e = await resp.json(); if (e.error) msg = e.error; } catch (_) {}
          helloBox.innerText = msg;
          introBox.innerText = "";
          return;
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          started = true;
          full += decoder.decode(value, { stream: true });
          render(full, helloBox, introBox);   // 每收到一块,实时重新分配两个框
        }
        if (!started) {
          helloBox.innerText = "没有收到内容,请重试。";
          introBox.innerText = "";
        } else if (full.includes(ERROR_MARK)) {
          // 后端中途报错:把已收到的内容+错误原因整段显示出来,不存历史、第二框不空转
          helloBox.innerText = full.replace("【打招呼语】", "").replace("【自我介绍】", "").trim();
          introBox.innerText = "";
        } else {
          const [hello, intro] = splitResult(full);
          if (!intro) introBox.innerText = "(本次没有生成自我介绍)";  // 没吐出【自我介绍】就别一直转圈
          saveRecord({ jd: jd, hello: hello, intro: intro });
        }
      } catch (e) {
        helloBox.innerText = "请求出错了:" + e.message;
        introBox.innerText = "";
      } finally {
        btn.disabled = false;
      }
    }

    // 实时分配:自我介绍标题出现前,全给第一框;出现后,按标题劈开各归各位
    function render(text, helloBox, introBox) {
      const [hello, intro] = splitResult(text);
      helloBox.innerText = hello;
      if (intro) introBox.innerText = intro;   // 自我介绍标题还没出现时,第二框保留打字动画
    }

    // 把完整文本按标题劈成 [打招呼语, 自我介绍]
    function splitResult(text) {
      const idx = text.indexOf("【自我介绍】");
      if (idx === -1) return [text.replace("【打招呼语】", "").trim(), ""];
      return [
        text.slice(0, idx).replace("【打招呼语】", "").trim(),
        text.slice(idx + "【自我介绍】".length).trim()
      ];
    }

    // ---- 各自复制(只复制正文,带按钮反馈)----
    function copyBox(boxId, btnEl) {
      copyText(document.getElementById(boxId).innerText, btnEl);
    }

    function copyText(text, btnEl) {
      navigator.clipboard.writeText(text);
      const old = btnEl.innerText;
      btnEl.innerText = "已复制 ✓";
      setTimeout(() => { btnEl.innerText = old; }, 1200);
    }

    // ---- PDF 导入(方案B:填入素材框供审阅)----
    async function uploadPdf() {
      const file = document.getElementById("pdfFile").files[0];
      if (!file) { alert("先选择一个PDF文件"); return; }
      document.getElementById("pdfStatus").innerText = "解析中……";
      const form = new FormData();
      form.append("file", file);
      const resp = await fetch("/parse_pdf", { method: "POST", body: form });
      const data = await resp.json();
      if (data.text) {
        document.getElementById("me").value = data.text;
        document.getElementById("pdfStatus").innerText = "已导入,请检查并可补充内容";
      } else {
        document.getElementById("pdfStatus").innerText = data.error;
      }
    }

    // ================= 历史记录(纯本地,存在浏览器 localStorage)=================
    const HISTORY_KEY = "firstHello.history";
    const MAX_HISTORY = 50;

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
      catch (e) { return []; }
    }
    function persistHistory(list) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
    }
    function saveRecord({ jd, hello, intro }) {
      if (!hello && !intro) return;               // 空结果不存
      const list = loadHistory();
      list.unshift({ id: Date.now(), ts: Date.now(), jd: jd, hello: hello, intro: intro });
      if (list.length > MAX_HISTORY) list.length = MAX_HISTORY;   // 只留最近 50 条
      persistHistory(list);
      renderHistory();
    }
    function deleteRecord(id) {
      persistHistory(loadHistory().filter(r => r.id !== id));
      renderHistory();
    }
    function clearHistory() {
      if (loadHistory().length === 0) return;
      if (!confirm("清空全部历史记录?此操作不可撤销。")) return;
      persistHistory([]);
      renderHistory();
    }
    function refillJd(jd) {
      document.getElementById("jd").value = jd;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function fmtTime(ts) {
      const d = new Date(ts);
      const p = n => String(n).padStart(2, "0");
      return `${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function jdTitle(jd) {
      const first = (jd.split("\n").find(l => l.trim()) || "无标题").trim();
      return first.length > 30 ? first.slice(0, 30) + "…" : first;
    }

    function renderHistory() {
      const box = document.getElementById("historyList");
      const list = loadHistory();
      box.innerHTML = "";
      if (list.length === 0) {
        const empty = document.createElement("div");
        empty.className = "hist-empty";
        empty.innerText = "还没有历史记录,生成一次后会自动保存在这里。";
        box.appendChild(empty);
        return;
      }
      list.forEach(rec => box.appendChild(buildHistItem(rec)));
    }

    // 用 DOM API 构建、正文一律走 innerText,避免 JD/生成内容里的字符被当成 HTML
    function buildHistItem(rec) {
      const item = document.createElement("div");
      item.className = "hist-item";

      const head = document.createElement("div");
      head.className = "hist-item-head";
      const title = document.createElement("span");
      title.className = "hist-jd";
      title.innerText = jdTitle(rec.jd);
      const time = document.createElement("span");
      time.className = "hist-time";
      time.innerText = fmtTime(rec.ts);
      head.appendChild(title);
      head.appendChild(time);

      const body = document.createElement("div");
      body.className = "hist-body";
      body.hidden = true;                          // 默认折叠,点标题展开
      if (rec.hello) body.appendChild(histBlock("打招呼语", rec.hello));
      if (rec.intro) body.appendChild(histBlock("自我介绍", rec.intro));

      const actions = document.createElement("div");
      actions.className = "hist-actions";
      if (rec.hello) actions.appendChild(mkBtn("复制打招呼语", "btn-copy", e => copyText(rec.hello, e.currentTarget)));
      if (rec.intro) actions.appendChild(mkBtn("复制自我介绍", "btn-copy", e => copyText(rec.intro, e.currentTarget)));
      actions.appendChild(mkBtn("填回JD", "btn-copy", () => refillJd(rec.jd)));
      actions.appendChild(mkBtn("删除", "btn-copy btn-danger", () => deleteRecord(rec.id)));
      body.appendChild(actions);

      head.addEventListener("click", () => { body.hidden = !body.hidden; });
      item.appendChild(head);
      item.appendChild(body);
      return item;
    }

    function histBlock(label, text) {
      const block = document.createElement("div");
      block.className = "hist-block";
      const l = document.createElement("div");
      l.className = "hist-label";
      l.innerText = label;
      const t = document.createElement("div");
      t.className = "hist-text";
      t.innerText = text;
      block.appendChild(l);
      block.appendChild(t);
      return block;
    }
    function mkBtn(label, cls, handler) {
      const b = document.createElement("button");
      b.className = cls;
      b.innerText = label;
      b.addEventListener("click", handler);
      return b;
    }

    renderHistory();   // 页面加载时先渲染一次
  </script>
</body>
</html>
